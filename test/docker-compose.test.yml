networks:
  wp-test-net:
    driver: bridge

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${VAULT_MYSQL_ROOT_PASS}
      - MYSQL_DATABASE=${VAULT_MYSQL_DATABASE}
      - MYSQL_USER=${VAULT_MYSQL_USER}
      - MYSQL_PASSWORD=${VAULT_MYSQL_PASS}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${VAULT_MYSQL_ROOT_PASS}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: 
      - wp-test-net
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    depends_on:
      db:
        condition: service_healthy
    image: wordpress:latest
    restart: always
    ports:
      - "8008:80"
    environment:
      - WORDPRESS_DB_HOST=db:3306
      - WORDPRESS_DB_USER=${VAULT_MYSQL_USER}
      - WORDPRESS_DB_PASSWORD=${VAULT_MYSQL_PASS}
      - WORDPRESS_DB_NAME=${VAULT_MYSQL_DATABASE}
      - WORDPRESS_DEBUG=1
      - WORDPRESS_DEBUG_DISPLAY=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: 
      - wp-test-net
    volumes:
      - wp_data:/var/www/html

  wordpress-cli:
    image: wordpress:cli
    profiles:
      - tools
    depends_on:
      wordpress:
        condition: service_healthy
    environment:
      - WORDPRESS_DB_HOST=db:3306
      - WORDPRESS_DB_USER=${VAULT_MYSQL_USER}
      - WORDPRESS_DB_PASSWORD=${VAULT_MYSQL_PASS}
      - WORDPRESS_DB_NAME=${VAULT_MYSQL_DATABASE}
    networks:
      - wp-test-net
    volumes:
      - wp_data:/var/www/html

  wpscan-init:
    image: alpine
    volumes:
      - wpscan_reports:/reports
    command:
      - sh
      - -c
      - |
        chown -R 1000:1000 /reports
    profiles:
      - tools

  wpscan:
    image: wpscanteam/wpscan
    profiles:
      - tools
    networks:
      - wp-test-net
    environment:
      - WPSCAN_API_TOKEN=${VAULT_WPSCAN_API_TOKEN}
    volumes:
      - ./reports:/reports

volumes:
  db_data:
  wp_data:
  wpscan_reports:
